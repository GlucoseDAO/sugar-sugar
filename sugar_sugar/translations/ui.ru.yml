  faq:
    title: "Часто задаваемые вопросы"
    sections:
      - title: "Почему это исследование важно"
        items:
          - q: "Что такое Sugar Sugar?"
            a: "Sugar Sugar — это веб-приложение для исследований, созданное на базе Dash. Оно превращает прогнозирование глюкозы в интерактивную игру: ты видишь часть графика CGM, рисуешь, как он будет продолжаться, а затем сравниваешь свой прогноз с реальными значениями. Цель — измерить, насколько точно люди могут предвидеть краткосрочную динамику глюкозы."
          - q: "Это настоящее научное исследование?"
            a: "Да. Sugar Sugar является частью реального научного проекта. Исследование получило одобрение Комитета по этике Университетской медицины Ростока (Universitätsmedizin Rostock) в Германии. Мы упоминаем об этом, чтобы ты знал, что исследование проводится ответственно."
          - q: "Почему предсказание глюкозы важно для людей с диабетом?"
            a: "Для людей с диабетом точные краткосрочные прогнозы глюкозы могут помочь в принятии более безопасных повседневных решений относительно инсулина, углеводов, физических упражнений и времени. Лучшее предсказание может помочь уменьшить опасные скачки и падения и сделать управление глюкозой менее стрессовым."
          - q: "Почему предсказание глюкозы важно для людей без диабета?"
            a: "Глюкоза — это ключевой метаболический сигнал, связанный с энергией, когницией, настроением, реакцией на упражнения и долгосрочным здоровьем. Для людей без диабета прогнозирование может показать, как еда, сон, стресс и активность влияют на метаболизм в реальном времени — это полезно для профилактики и оптимизации образа жизни."
          - q: "Почему человеческая точность так важна для машинного обучения?"
            a: "В настоящее время не существует опубликованного человеческого базового уровня точности для прогнозирования глюкозы CGM. Не зная, насколько хорошо информированный человек может предсказывать тренды глюкозы, мы не можем оценить, действительно ли полезна какая-либо модель ML — она может быть хуже опытного диабетика или лучше только в определенных сценариях. Это исследование устанавливает этот базовый уровень, чтобы будущие работы по ML можно было сравнивать осмысленно."
          - q: "Человек знает гораздо больше, чем показывает любой график — еда, сон, стресс, пищеварение, цикл. Без всего этого разве это не гадание по графикам?"
            a: >-
              Когда ты смотришь на свой график CGM, ты уже чувствуешь, куда движется глюкоза.
              Ты не перечисляешь каждый фактор осознанно. Ты смотришь на кривую и считываешь то, что уже происходит.


              Это работает потому, что всё, что ты не записал, всё равно отражается в глюкозе.
              Постпрандиальный пик выглядит как постпрандиальный пик независимо от того, были ли введены углеводы.
              Активный инсулин тянет кривую вниз узнаваемым образом.
              Линия глюкозы — это результат всего происходящего, даже того, что не было отслежено.


              Кроме того, если ты загрузишь свои данные CGM, на графике отобразятся записанные углеводы, инсулин и физическая активность в виде маркеров. Так что это не голая линия глюкозы.


              Похоже ли это на «технический анализ» в биржевой торговле? Нет.
              Цены на бирже движутся массовой психологией, и сам прогноз двигает рынок.
              Глюкоза — это биохимия. У инсулина известная кривая действия. Углеводы усваиваются с известной скоростью.
              Следующий час в основном определяется тем, что уже происходит прямо сейчас.


              Исследования это подтверждают: работы, сравнивающие модели прогнозирования глюкозы с учётом и без учёта приёмов пищи и инсулина,
              показали, что добавление этих ковариат не улучшило краткосрочную точность
              ([Daniels et al., 2022](https://pmc.ncbi.nlm.nih.gov/articles/PMC8782424/);
              [The Maastricht Study, 2021](https://pmc.ncbi.nlm.nih.gov/articles/PMC8224858/)).
              Сигнала CGM достаточно для прогноза на следующий час.


              Мы не просим никого описывать весь свой день для модели.
              Вопрос в том: глядя на экран, насколько точно ты можешь определить, куда движется глюкоза?
      - title: "Как работает исследование"
        items:
          - q: "Кто может участвовать?"
            a: "Любой человек старше 18 лет. Пользователи CGM особенно ценны, но люди без CGM также могут играть, используя общие данные."
          - q: "Какие устройства CGM и форматы поддерживаются?"
            a: "Поддерживаются экспорты из Dexcom, Libre, Medtronic и Nightscout. Также доступен общий пример данных, если у тебя нет устройства CGM."
          - q: "Сколько времени это занимает?"
            a: "Каждый раунд занимает около 2–3 минут. Полная сессия (12 раундов) длится около 30 минут, но ты можешь разделить её на несколько посещений."
          - q: "Могу ли я остановиться на полпути и продолжить позже?"
            a: "Да. Игра сохраняет твой прогресс локально в браузере. Если 12 раундов кажутся слишком большим за один раз, закрой вкладку и вернись позже — тебе будет предложено продолжить с того места, где ты остановился. Даже несколько раундов полезны, но каждый дополнительный раунд улучшает качество данных."
          - q: "Что если мне не нравятся мои результаты? Стоит ли начать сначала?"
            a: "Пожалуйста, не начинай сначала только потому, что недоволен своей точностью. Люди естественным образом склонны сохранять хорошие результаты и отбрасывать плохие, но это исказит исследование и сделает результаты менее научно обоснованными. Если чувствуешь разочарование, лучше продолжить следующий раунд, а не сбрасывать прогресс."
          - q: "Какие используются показатели точности?"
            a: "Мы используем стандартные метрики прогнозирования — MAE, RMSE и MAPE — для количественной оценки того, насколько близко твоя предсказанная кривая глюкозы была к реальной. MAE — это средняя абсолютная ошибка: она говорит о том, насколько ты ошибался в среднем. RMSE более строго наказывает за крупные ошибки, подчёркивая случаи, когда прогноз был совсем неверным. MAPE выражает ошибку в процентах, что помогает сравнивать результаты в разных диапазонах глюкозы. Вместе эти метрики дают более полную картину, чем один показатель."
          - q: "Каковы ограничения этого исследования?"
            a: >-
              Мы хотим быть честными:

              - **Только короткий горизонт.** Мы просим тебя предсказать следующий час. Долгосрочное прогнозирование — гораздо более сложная задача, где доминируют неизмеренные факторы.

              - **Записанные события могут быть неполными.** На графике отображается то, что записало твоё приложение CGM — если ты не записал приём пищи или дозу, они не появятся, и ты, и модель работаете с одной и той же неполной картиной.

              - **Нет личного контекста.** В реальной жизни ты знаешь то, чего нет в данных — что ты заболеваешь, что скоро пойдёшь на пробежку, что это твой третий кофе. Это исследование изолирует способность читать график от личных знаний.

              - **Нет давления реального времени.** Спокойно рисовать линию прогноза — это не то же самое, что принимать решение о дозировке в 2 часа ночи в полусонном состоянии.

              - **Пример данных vs. собственные данные.** Если ты играешь со встроенными примерами данных, твоя точность может отличаться от прогнозирования собственной глюкозы. Мы рекомендуем загрузить свой экспорт CGM (Dexcom, Libre, Medtronic или Nightscout) — твоя личная интуиция относительно собственных паттернов — это часть того, что делает сравнение с ML интересным.
      - title: "Данные и конфиденциальность"
        items:
          - q: "Сохраняются ли мои данные?"
            a: "Пока ты не решишь отправить результаты, всё остаётся в твоём браузере. Ничего не отправляется на наши серверы, пока ты не дашь активное согласие и не нажмёшь кнопку отправки. Если ты выберешь «Я хочу только поиграть», никакие данные не покинут твоё устройство."
          - q: "Какие данные собираются, если я дам согласие?"
            a: "Данные игры (нарисованные предсказания, показатели точности), по желанию — твой загруженный файл CGM и короткая анкета (возраст, опыт работы с CGM, статус диабета и т. д.)."
          - q: "Передаются ли мои данные CGM третьим лицам?"
            a: "Нет. Данные используются исключительно для этого исследования и никогда не продаются и не передаются неавторизованным лицам."
          - q: "Могу ли я отказаться от участия?"
            a: "Да, в любое время, просто закрыв браузер. Чтобы удалить уже отправленные данные, пожалуйста, свяжись с командой исследования."
          - q: "Что мешает участникам подделывать результаты?"
            a: "Честно говоря? Ничего технического. Поскольку все данные хранятся локально в твоём браузере, мы полностью полагаемся на честность и добросовестность участников — и искренне доверяем тебе. Тем не менее, если ты очень хочешь похвастаться перед друзьями подозрительно идеальным результатом, просто сделай скриншот и отредактируй его в графическом редакторе или воспользуйся DevTools браузера для изменения отображаемых чисел. Пожалуйста, не отправляй поддельные данные в исследование — это напрямую вредит научной достоверности работы, от которой выигрывают все."
      - title: "Помощь и вклад в проект"
        items:
          - q: "Что делать, если я нашёл ошибку?"
            a: "Пожалуйста, открой тикет на GitHub проекта по адресу [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Отчёты об ошибках очень помогают улучшать приложение и выявлять всё, что может повлиять на ход исследования или качество данных."
          - q: "Я разработчик ПО. Могу ли я добавить функцию?"
            a: "Да, вклад приветствуется через GitHub проекта по адресу [github.com/GlucoseDAO/sugar-sugar](https://github.com/GlucoseDAO/sugar-sugar). Мы особенно приветствуем исправления, улучшения пользовательского интерфейса, поддержку большего количества датчиков или форматов файлов и другие изменения, которые улучшают удобство использования без изменения научного протокола. Поскольку это активное исследование, изменения, влияющие на дизайн исследования, следует сначала обсудить с командой."
          - q: "Как ещё я могу помочь исследованию?"
            a: "Даже если ты не разработчик, ты всё равно можешь очень помочь. Поделись ссылкой на исследование в соответствующих сообществах, расскажи о нём другим пользователям CGM или заинтересованным людям, сообщай о неясных формулировках или проблемах с удобством использования и связывайся с командой исследования через каналы связи проекта, если хочешь сотрудничать."
          - q: "Где я могу найти полный дизайн исследования?"
            a: "На странице «Исследование» в навигационной панели, которая содержит ссылку на скачивание PDF и ссылку на репозиторий GitHub."